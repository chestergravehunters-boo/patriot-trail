<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chesterland Patriot Trail</title>

  <style>
    /* Reset */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: black; /* Change to white if you prefer */
    }

    /* Full-screen hero container */
    .hero {
      width: 100%;
      height: 100vh;
      background-image: url('landing-portrait.png'); /* ← CHANGE THIS */
      background-size: contain;     /* Keeps full image visible */
      background-repeat: no-repeat; /* Prevents tiling */
      background-position: center;  /* Centers the portrait */
    }

    /* Optional text styling if you add text later */
    .content {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 1.2rem;
    }
  </style>
</head>

<body>
  <div class="hero"></div>

  <!-- Optional text area -->
  <!--
  <div class="content">
    Chesterland Patriot Trail
  </div>
  -->
</body>

</html>
